name: command_center
description: 知知 — AI 时代的管理者指挥台
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.3.0
  record: ^5.1.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.0
  flutter_markdown: ^0.7.6
  url_launcher: ^6.3.0
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.0

dependency_overrides:
  record_linux: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
